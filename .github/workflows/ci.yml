name: CI

# Single-branch, no-PR repo: run on pushes to main and on demand. No pull_request
# trigger, since work lands directly on main (see CLAUDE.md "Git workflow").
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Match requires-python = ">=3.10" in pyproject.toml.
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run hermetic tests
        # LW_LIVE_TESTS is left unset, so the one live-network test stays skipped and CI
        # never touches the forum API — the run is fully deterministic and offline.
        run: pytest -q

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Same matrix as `test`: ruff is version-independent, but mypy resolves stdlib stubs
      # from the running interpreter, so type-check on every supported version.
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Ruff (lint)
        run: ruff check .

      - name: Mypy (type-check the package)
        run: mypy lesswrong_mcp
